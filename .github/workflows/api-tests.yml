name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancel superseded runs on the same branch/PR to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run API test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # No browser install step here on purpose: this framework only exercises
      # Playwright's APIRequestContext (see support/fixtures.ts) and never
      # launches a browser page, so `playwright install` isn't needed and
      # would only slow the pipeline down.

      - name: Run tests
        id: run_tests
        # Reporters (list, html, allure-playwright, github) all come from
        # playwright.config.ts — GitHub Actions sets CI=true automatically,
        # which is what makes the config append the `github` annotations
        # reporter. --skip-open avoids trying to launch a browser in CI.
        #
        # The || fallbacks below matter: if a repo variable/secret isn't set,
        # GitHub Actions still injects the env var as an EMPTY STRING (not
        # unset), which silently defeats playwright.config.ts's own
        # `process.env.BASE_URL ?? default` fallback (?? only catches
        # null/undefined, not ""). Resolving the default here in the
        # workflow means the suite runs correctly even with zero configured
        # secrets — TEST_USERNAME/TEST_PASSWORD below are the public seeded
        # demo user for the Platzi Fake Store sandbox API, not real
        # credentials, so a hardcoded fallback is safe. Override any of them
        # by setting the corresponding repo secret/variable.
        run: npm run test:ci
        continue-on-error: true
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://api.escuelajs.co/api/v1/' }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME || 'john@mail.com' }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'changeme' }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload raw Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
